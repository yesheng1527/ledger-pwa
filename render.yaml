services:
  - type: web
    name: ledger-pwa
    runtime: static
    buildCommand: echo "Static site ready"
    staticPublishPath: .
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /service-worker.js
        name: Cache-Control
        value: no-cache
      - path: /app.js
        name: Cache-Control
        value: no-cache
      - path: /supabase-config.js
        name: Cache-Control
        value: no-cache
